services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-company-app-dev
    working_dir: /workspace
    env_file:
      - .env.example
      - .env
    environment:
      OPENCLAW_RUNTIME_MODE: ${OPENCLAW_RUNTIME_MODE:-gateway}
      OPENCLAW_GATEWAY_BASE_URL: ${OPENCLAW_GATEWAY_BASE_URL:-http://openclaw-gateway:18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-token}
      OPENCLAW_GATEWAY_HOST_PORT: ${OPENCLAW_GATEWAY_HOST_PORT:-18789}
    volumes:
      - .:/workspace
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  openclaw-provisioner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-company-openclaw-provisioner
    working_dir: /workspace
    env_file:
      - .env.example
      - .env
    environment:
      OPENCLAW_RUNTIME_MODE: ${OPENCLAW_RUNTIME_MODE:-gateway}
      OPENCLAW_GATEWAY_BASE_URL: ${OPENCLAW_GATEWAY_BASE_URL:-http://openclaw-gateway:18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-token}
      OPENCLAW_GATEWAY_HOST_PORT: ${OPENCLAW_GATEWAY_HOST_PORT:-18789}
      OPENCLAW_RUNTIME_HOME: ${OPENCLAW_RUNTIME_HOME:-.runtime/openclaw/home}
    volumes:
      - .:/workspace
    command: python -m app.openclaw.provisioner
    restart: "no"

  openclaw-gateway:
    image: ${OPENCLAW_GATEWAY_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.7}
    container_name: multi-agent-company-openclaw-gateway
    environment:
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw/config
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-token}
    volumes:
      - ./.runtime/openclaw/home:/home/node/.openclaw
    command:
      - sh
      - -lc
      - |
        until [ -f /home/node/.openclaw/config/openclaw.json ]; do
          sleep 1
        done
        exec openclaw gateway run
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_HOST_PORT:-18789}:18789"
    depends_on:
      openclaw-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: multi-agent-company-postgres
    environment:
      POSTGRES_DB: multi_agent_company
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent_company"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: multi-agent-company-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: multi-agent-company-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: multi-agent-company-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
